name: Build and Package KLog

on:
  push:
    branches: [ master, main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ master, main ]

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: macos
            qt_arch: clang_64
          - os: windows-latest
            platform: windows
            qt_arch: win64_msvc2019_64
          - os: ubuntu-latest
            platform: linux
            qt_arch: linux_gcc_64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.7.2'
          arch: ${{ matrix.qt_arch }}
          # Base modules like Qml/Quick are included by default in Qt 6 
          modules: 'qtcharts qtlocation qtpositioning qtserialport'
          cache: true

      - name: Install Dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl1-mesa-dev \
            libxkbcommon-dev \
            build-essential \
            ninja-build \
            libxcb-cursor0 \
            libhamlib-dev \
            libudev-dev

      - name: Install Dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install hamlib

      - name: Install Dependencies (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          curl -L https://github.com/Hamlib/Hamlib/releases/download/4.5.5/hamlib-w64-4.5.5.p1.zip -o hamlib.zip
          unzip hamlib.zip -d hamlib_temp
          mkdir -p ../libs/win64/hamlib
          cp -r hamlib_temp/hamlib-w64-4.5.5.p1/* ../libs/win64/hamlib/
          choco install nsis -y

      - name: Update Translations
        shell: bash
        run: |
          lupdate src/ -no-obsolete -ts src/translations/*.ts
          lrelease src/translations/*.ts

      - name: Configure CMake
        shell: bash
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_TESTING=ON

      - name: Build
        run: cmake --build build --config Release

      - name: Run Tests
        shell: bash
        run: |
          cd build
          ctest --output-on-failure -C Release

      - name: Package
        shell: bash
        run: |
          cd build
          cpack -C Release

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: KLog-${{ matrix.platform }}-package
          path: |
            build/*.dmg
            build/*.exe
            build/*.tar.gz

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/*.dmg
            build/*.exe
            build/*.tar.gz
          name: KLog ${{ github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
