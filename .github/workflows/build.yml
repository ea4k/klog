name: Build and Package KLog

on:
  push:
    branches: [ master, main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ master, main ]

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: macos
            qt_arch: clang_64
          - os: windows-latest
            platform: windows
            qt_arch: win64_msvc2019_64
          - os: ubuntu-latest
            platform: linux
            qt_arch: linux_gcc_64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.7.2'
          arch: ${{ matrix.qt_arch }}
          modules: 'qtcharts qtlocation qtpositioning qtserialport'
          cache: true

      - name: Install Dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl1-mesa-dev \
            libxkbcommon-dev \
            build-essential \
            ninja-build \
            libxcb-cursor0 \
            libhamlib-dev \
            libudev-dev

      - name: Install Dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install hamlib

      - name: Install Dependencies (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $url = "https://github.com/Hamlib/Hamlib/releases/download/4.7.0/hamlib-w64-4.7.0.zip"
          $output = "hamlib.zip"
          Invoke-WebRequest -Uri $url -OutFile $output
          
          if ((Get-Item $output).Length -lt 10000) {
             Write-Error "Download failed or file is corrupted."
             exit 1
          }

          Expand-Archive -Path $output -DestinationPath hamlib_temp -Force
          $destPath = "$env:GITHUB_WORKSPACE/../libs/win64/hamlib"
          if (!(Test-Path $destPath)) { New-Item -ItemType Directory -Path $destPath -Force }
          
          Copy-Item -Path "hamlib_temp/hamlib-w64-4.7.0/*" -Destination "$destPath/" -Recurse -Force
          choco install nsis -y

      - name: Update Translations
        shell: bash
        run: |
          lupdate src/ -no-obsolete -ts src/translations/*.ts
          lrelease src/translations/*.ts

      - name: Configure CMake
        shell: bash
        run: |
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            cmake -S . -B build \
              -DCMAKE_BUILD_TYPE=Release \
              -DBUILD_TESTING=OFF \
              -DHamlib_INCLUDE_DIR="$GITHUB_WORKSPACE/../libs/win64/hamlib/include" \
              -DHamlib_LIBRARY="$GITHUB_WORKSPACE/../libs/win64/hamlib/lib/libhamlib.dll.a"
          else
            cmake -S . -B build \
              -DCMAKE_BUILD_TYPE=Release \
              -DBUILD_TESTING=OFF
          fi

      - name: Build
        run: cmake --build build --config Release

      - name: Package
        shell: bash
        run: |
          cd build
          cpack -C Release

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: KLog-${{ matrix.platform }}-package
          path: |
            build/*.dmg
            build/*.exe
            build/*.tar.gz

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/*.dmg
            build/*.exe
            build/*.tar.gz
          name: KLog ${{ github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}name: Build and Package KLog

